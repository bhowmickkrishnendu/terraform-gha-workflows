name: Terraform Plan Reusable Workflow

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      component:
        required: true
        type: string
      aws_region:
        required: true
        type: string
      role_to_assume:
        required: true
        type: string
      terraform_version:
        required: false
        type: string
        default: "1.14"
      tfvars_file:
        required: true
        type: string
    secrets:
      INFRACOST_API_KEY:
        required: true

jobs:
  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: environments/${{ inputs.environment }}/${{ inputs.component }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_to_assume }}
          aws-region: ${{ inputs.aws_region }}

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate -no-color

      # === SECURITY & QUALITY GATES ===
      
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Initialize TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint --format compact --color
        continue-on-error: false

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov Security Scan
        run: |
          checkov -d . \
            --framework terraform \
            --output cli \
            --compact \
            --soft-fail-on LOW
        continue-on-error: false

      # === END SECURITY GATES ===

      - name: Terraform Plan
        run: |
          terraform plan \
            -no-color \
            -input=false \
            -out=tfplan \
            -var-file="${{ inputs.tfvars_file }}"
        env:
          TF_VAR_public_key: ${{ secrets.SYS_PUBKEY }}

      - name: Upload Terraform Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-${{ inputs.component }}
          path: environments/${{ inputs.environment }}/${{ inputs.component }}/tfplan

      - name: Setup Infracost
        uses: infracost/actions/setup@v3

      - name: Generate Infracost Breakdown
        run: |
          infracost breakdown \
            --path . \
            --terraform-var-file="${{ inputs.tfvars_file }}" \
            --format table
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}