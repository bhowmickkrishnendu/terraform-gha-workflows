name: Terraform Apply Reusable Workflow

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

      component:
        required: true
        type: string

      aws_region:
        required: true
        type: string

      role_to_assume:
        required: true
        type: string

      terraform_version:
        required: false
        type: string
        default: "1.14"

      tfvars_file:
        required: true
        type: string

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest

    environment:
      name: production

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: environments/${{ inputs.environment }}/${{ inputs.component }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_to_assume }}
          aws-region: ${{ inputs.aws_region }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -var-file="${{ inputs.tfvars_file }}"

      - name: Terraform Apply
        run: terraform apply -input=false tfplan